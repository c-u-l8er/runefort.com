<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>
            @runefort/core — full-hierarchy LLM authoring (campus / building /
            floor / room)
        </title>
        <link rel="stylesheet" href="/packages/core/theme.css" />
        <link rel="stylesheet" href="/packages/core/theme-foundry.css" />

        <!-- Optional: site-local Supabase config. Create runefort-config.js in the
       repo root with `window.RUNEFORT_SUPABASE = { url, anonKey };` to enable
       cloud sync. The file is gitignored. If absent, runefort runs in
       local-only mode (no auth, no sync, no public fort URLs). -->
        <script src="/runefort-config.js" onerror="void 0"></script>

        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                background: #0a0c0a;
            }
            body {
                color: #e8e4d8;
                font-family: ui-monospace, "JetBrains Mono", monospace;
            }

            /* Sticky header — wraps the toolbar + marquee + action bar + demo
       banner so the whole stack pins together as a single unit. Avoids the
       brittle "each child has a hand-tuned `top` value" pattern that broke
       whenever any child's height changed by a few pixels. */
            .sticky-header {
                position: sticky;
                top: 0;
                z-index: 10;
                background: #0a0c0a;
            }

            /* Top-level toolbar (above all campuses) */
            .sticky-header > .top-toolbar {
                display: flex;
                align-items: center;
                padding: 8px 16px;
                gap: 10px;
                background: #141714;
                border-bottom: 1px solid #2a322a;
                font-size: 11px;
                letter-spacing: 0.04em;
            }
            .top-toolbar .brand {
                color: #7fb850;
                letter-spacing: 0.15em;
                margin-right: 12px;
            }

            /* Action bar — sits below top marquee */
            .sticky-header > .action-bar {
                display: flex;
                gap: 8px;
                align-items: center;
                padding: 6px 16px;
                background: #0a0c0a;
                border-bottom: 1px solid #1c211c;
                font-size: 10px;
            }
            .action-bar .label {
                color: #6e6c63;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                margin-right: 8px;
            }
            .action-bar .selected {
                margin-left: auto;
                color: #6e6c63;
            }
            .action-bar .selected code {
                color: #7fb850;
            }

            /* Building grid */
            rune-campus rune-building {
                /* Default: elevator + floor only. Floor expands to fill the page width
         when no thread sidebar is present. */
                grid-template-columns: 200px minmax(0, 1fr);
                grid-template-rows: auto 1fr;
                min-height: calc(100vh - 130px);
            }
            /* When a thread is mounted alongside, reserve its right column. */
            rune-campus rune-building:has(> rune-thread) {
                grid-template-columns: 200px minmax(0, 1fr) 460px;
            }
            rune-campus rune-building > rune-marquee {
                grid-column: 1 / -1;
            }
            rune-campus rune-building > rune-elevator {
                grid-row: 2 / -1;
                grid-column: 1 / 2;
            }
            rune-campus rune-building > rune-floor {
                grid-row: 2 / -1;
                grid-column: 2 / 3;
                padding: 24px;
                align-content: start;
            }
            rune-campus rune-building > rune-thread {
                grid-row: 2 / -1;
                grid-column: 3 / 4;
                border-left: 1px solid #2a322a;
            }

            rune-room {
                min-height: 80px;
            }
            rune-room strong {
                color: #e8e4d8;
                font-weight: 400;
                font-size: 13px;
            }
            rune-room .room-body {
                font-size: 11px;
                color: #a8a59a;
                margin-top: 4px;
                line-height: 1.4;
            }
            rune-room[data-runefort-generated="true"] {
                box-shadow: inset 0 0 0 1px rgba(127, 184, 80, 0.3);
            }

            .cost-meter {
                font-size: 10px;
                color: #6e6c63;
                padding: 4px 10px;
                border: 1px solid #2a322a;
            }
            .cost-meter.over-budget {
                color: #ff8a3d;
                border-color: #ff8a3d;
            }

            .toast {
                position: fixed;
                bottom: 16px;
                right: 16px;
                padding: 10px 14px;
                background: #1c211c;
                border: 1px solid #2a322a;
                border-left: 3px solid #7fb850;
                color: #e8e4d8;
                font-size: 11px;
                max-width: 360px;
                z-index: 100;
            }
            .toast.error {
                border-left-color: #ff8a3d;
            }
            .toast.fade {
                opacity: 0;
                transition: opacity 400ms;
            }

            /* Marquee separator */
            .runefort-marquee-sep {
                color: #3a3f3a;
                margin: 0 4px;
            }

            /* Fort picker (top-toolbar dropdown) */
            .fort-picker {
                position: relative;
                display: inline-flex;
                margin-left: 4px;
            }
            .fort-picker-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 4px 10px;
                background: #0a0c0a;
                border: 1px solid #2a322a;
                color: #e8e4d8;
                font: inherit;
                font-size: 11px;
                cursor: pointer;
                letter-spacing: 0.04em;
            }
            .fort-picker-btn:hover {
                border-color: #7fb850;
                color: #7fb850;
            }
            .fort-picker-caret {
                color: #6e6c63;
                font-size: 10px;
            }
            .fort-picker-label {
                color: #7fb850;
            }
            .fort-picker-menu {
                position: absolute;
                top: calc(100% + 4px);
                left: 0;
                min-width: 260px;
                background: #141714;
                border: 1px solid #2a322a;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
                z-index: 20;
                padding: 4px 0;
                max-height: 60vh;
                overflow-y: auto;
            }
            .fort-picker-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 6px 12px;
                font-size: 11px;
                color: #e8e4d8;
                cursor: pointer;
                letter-spacing: 0.02em;
            }
            .fort-picker-item:hover {
                background: #1c211c;
            }
            .fort-picker-item.active {
                color: #7fb850;
            }
            .fort-picker-item.active::before {
                content: "▸ ";
                margin-right: 4px;
            }
            .fort-picker-item .fort-meta {
                color: #6e6c63;
                font-size: 9px;
                margin-left: 12px;
            }
            .fort-picker-actions {
                padding: 6px 12px;
                border-top: 1px solid #2a322a;
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                font-size: 10px;
            }
            .fort-picker-actions button {
                background: transparent;
                border: 1px solid #2a322a;
                color: #a8a59a;
                padding: 3px 8px;
                font: inherit;
                font-size: 10px;
                cursor: pointer;
                letter-spacing: 0.05em;
            }
            .fort-picker-actions button:hover {
                color: #7fb850;
                border-color: #7fb850;
            }
            .fort-picker-actions button.danger:hover {
                color: #ff8a3d;
                border-color: #ff8a3d;
            }
            .fort-picker-sep {
                height: 1px;
                background: #2a322a;
                margin: 4px 0;
            }

            /* Demo banner — last child of the sticky-header so it pins along with
       the toolbar/marquee/action-bar above it. */
            .demo-banner {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 16px;
                background: linear-gradient(90deg, #1c211c 0%, #141714 100%);
                border-bottom: 1px solid #2a322a;
                border-left: 3px solid #7fb850;
                font-size: 11px;
            }
            .demo-banner[hidden] {
                display: none;
            }
            .demo-banner .demo-icon {
                color: #7fb850;
                font-size: 14px;
            }
            .demo-banner .demo-text {
                color: #a8a59a;
                line-height: 1.4;
            }
            .demo-banner .demo-text strong {
                color: #e8e4d8;
            }
            .demo-banner .demo-fork {
                margin-left: auto;
                background: #7fb850;
                border: 1px solid #7fb850;
                color: #0a0c0a;
                padding: 6px 14px;
                font: inherit;
                font-size: 11px;
                letter-spacing: 0.05em;
                cursor: pointer;
                text-transform: uppercase;
            }
            .demo-banner .demo-fork:hover {
                background: #9fd870;
                border-color: #9fd870;
            }
            body.is-demo rune-room,
            body.is-demo rune-floor,
            body.is-demo rune-building,
            body.is-demo rune-campus {
                pointer-events: auto; /* still allow scroll/focus, but block edits via JS */
            }

            /* ─── Responsive: tablet & mobile ─────────────────────────────────
               The toolbars are flex rows. When the viewport is narrow, individual
               <rune-action> buttons get squeezed and their "icon + label" content
               wraps onto two lines. Letting the *toolbar itself* wrap by row
               keeps each button on a single line and stacks them tidily. */
            .sticky-header > .top-toolbar,
            .sticky-header > .action-bar {
                flex-wrap: wrap;
                row-gap: 6px;
            }
            /* Keep individual buttons from collapsing their own content. */
            .sticky-header rune-action {
                flex-shrink: 0;
                white-space: nowrap;
            }
            .sticky-header .fort-picker-btn {
                white-space: nowrap;
            }

            /* Tablet (≤900px): tighten paddings, allow the right-side toolbar
               cluster (cost / sign-in / settings / clear) to wrap under the
               brand+fort-picker without pushing things off-screen. */
            @media (max-width: 900px) {
                .sticky-header > .top-toolbar,
                .sticky-header > .action-bar {
                    padding-left: 12px;
                    padding-right: 12px;
                }
                .top-toolbar .brand {
                    margin-right: 6px;
                }
                .action-bar .selected {
                    /* Help text drops to its own row instead of squeezing
                       the buttons. */
                    margin-left: 0;
                    flex-basis: 100%;
                    order: 99;
                    font-size: 10px;
                }
                /* Building grid: thread sidebar shrinks first. */
                rune-campus rune-building:has(> rune-thread) {
                    grid-template-columns: 180px minmax(0, 1fr) 320px;
                }
            }

            /* Mobile (≤640px): stack the building grid so the elevator
               sits above the floor and any open thread drops below the
               floor instead of forcing a 3-column scroll. Also drop the
               "+ " prefix on the generate buttons via a shorter label. */
            @media (max-width: 640px) {
                .sticky-header > .top-toolbar,
                .sticky-header > .action-bar {
                    padding-left: 10px;
                    padding-right: 10px;
                    gap: 6px;
                }
                /* The right-side toolbar group ({cost, sync, auth, settings,
                   clear}) is an inline div with margin-left:auto. On mobile
                   we drop it onto its own row and let it wrap internally. */
                .top-toolbar > div[style*="margin-left: auto"] {
                    margin-left: 0 !important;
                    flex-basis: 100%;
                    flex-wrap: wrap;
                    justify-content: flex-start;
                }
                .sticky-header rune-action {
                    padding: 5px 9px;
                    font-size: 10px;
                    letter-spacing: 0.06em;
                }
                .cost-meter {
                    font-size: 9px;
                    padding: 3px 8px;
                }
                .demo-banner {
                    flex-wrap: wrap;
                    padding: 8px 12px;
                    gap: 8px;
                }
                .demo-banner .demo-fork {
                    margin-left: 0;
                    flex-basis: 100%;
                    text-align: center;
                }
                /* Stack building grid: elevator on top, floor below, thread
                   (when present) at the bottom. */
                rune-campus rune-building,
                rune-campus rune-building:has(> rune-thread) {
                    grid-template-columns: minmax(0, 1fr);
                    grid-template-rows: auto auto 1fr auto;
                    min-height: auto;
                }
                rune-campus rune-building > rune-marquee {
                    grid-column: 1 / -1;
                    grid-row: 1 / 2;
                }
                rune-campus rune-building > rune-elevator {
                    grid-column: 1 / -1;
                    grid-row: 2 / 3;
                    border-bottom: 1px solid #2a322a;
                }
                rune-campus rune-building > rune-floor {
                    grid-column: 1 / -1;
                    grid-row: 3 / 4;
                    padding: 16px;
                }
                rune-campus rune-building > rune-thread {
                    grid-column: 1 / -1;
                    grid-row: 4 / 5;
                    border-left: none;
                    border-top: 1px solid #2a322a;
                }
                .fort-picker-menu {
                    min-width: 220px;
                    max-width: calc(100vw - 24px);
                }
                .toast {
                    left: 12px;
                    right: 12px;
                    bottom: 12px;
                    max-width: none;
                }
            }
        </style>
    </head>
    <body data-theme="foundry">
        <header class="sticky-header">
            <!-- ───── Top toolbar (above campuses) ───── -->
            <div class="top-toolbar">
                <a href="/" style="text-decoration: none"
                    ><span class="brand">RUNEFORT</span></a
                >
                <div class="fort-picker" id="fort-picker">
                    <button
                        type="button"
                        class="fort-picker-btn"
                        id="fort-picker-btn"
                        aria-haspopup="listbox"
                        aria-expanded="false"
                    >
                        <span class="fort-picker-label" id="fort-picker-label"
                            >Untitled fort</span
                        >
                        <span class="fort-picker-caret">▾</span>
                    </button>
                    <div
                        class="fort-picker-menu"
                        id="fort-picker-menu"
                        hidden
                        role="listbox"
                    ></div>
                </div>
                <div
                    style="
                        margin-left: auto;
                        display: flex;
                        gap: 8px;
                        align-items: center;
                    "
                >
                    <span class="cost-meter" id="cost-meter"
                        >cost: $0.0000</span
                    >
                    <rune-action
                        id="sync-fort"
                        label="sync"
                        icon="↑↓"
                        hidden
                    ></rune-action>
                    <rune-action
                        id="auth-action"
                        label="sign in"
                        icon="◐"
                    ></rune-action>
                    <rune-action
                        id="settings"
                        label="settings"
                        icon="⚙"
                    ></rune-action>
                    <rune-action
                        id="clear-threads"
                        label="clear all"
                        icon="✕"
                    ></rune-action>
                </div>
            </div>

            <!-- ───── Top campus marquee (auto-fills from <rune-campus>es below) ───── -->
            <rune-marquee scope="campus"></rune-marquee>

            <!-- ───── Action bar (4 generation levels) ───── -->
            <div class="action-bar">
                <span class="label">generate</span>
                <rune-action
                    id="add-room"
                    label="+ room"
                    icon="▫"
                    keybinding="ctrl+shift+r"
                ></rune-action>
                <rune-action
                    id="add-floor"
                    label="+ floor"
                    icon="▭"
                    keybinding="ctrl+shift+f"
                ></rune-action>
                <rune-action
                    id="add-building"
                    label="+ building"
                    icon="◫"
                    keybinding="ctrl+shift+b"
                ></rune-action>
                <rune-action
                    id="add-campus"
                    label="+ campus"
                    icon="▦"
                    keybinding="ctrl+shift+c"
                ></rune-action>
                <span style="color: #3a3f3a">|</span>
                <rune-action
                    id="refine"
                    label="refine selected"
                    icon="↻"
                    disabled
                    keybinding="ctrl+shift+e"
                ></rune-action>
                <rune-action
                    id="open-detail"
                    label="open detail"
                    icon="▤"
                    disabled
                    keybinding="ctrl+shift+d"
                ></rune-action>
                <span class="selected" id="selected-info"
                    >click a tile to select · double-click (or Enter) to open
                    detail · scope ↑</span
                >
            </div>

            <!-- ───── Demo banner (only shown when viewing the read-only demo fort) ───── -->
            <div class="demo-banner" id="demo-banner" hidden>
                <span class="demo-icon">ᚲ</span>
                <span class="demo-text">
                    <strong>You're viewing the demo fort.</strong>
                    Fork it to start editing — your copy lives in this browser's
                    local storage.
                </span>
                <button type="button" class="demo-fork" id="demo-fork-btn">
                    Fork to start editing
                </button>
            </div>
        </header>

        <!-- Campus content is mounted dynamically: either the demo fort (forts/welcome.json)
       on first visit, or the user's persisted entities via restoreEntities(). -->

        <div id="toast-host"></div>

        <script type="module">
            import "/packages/core/src/index.js";
            import {
                settings,
                RECOMMENDED_MODELS,
                generateRoomFor,
                generateFloorFor,
                generateBuildingFor,
                generateCampusFor,
                refineRoom,
                refineEntity,
                threadStore,
                entityStore,
                fortStore,
                restoreEntities,
                campusFromJson,
            } from "/packages/core/src/runtime.js";
            import {
                isSupabaseConfigured,
                signIn,
                signUp,
                signInWithMagicLink,
                signInWithProvider,
                resetPasswordForEmail,
                signOut,
                getCurrentUser,
                onAuthChange,
                pushFort,
                pullFort,
                listCloudForts,
                loadPublicFort,
                forkCloudFort,
            } from "/packages/core/src/supabase.js";
            import {
                roomKinds,
                floorTemplates,
                buildingTemplates,
                campusTemplates,
            } from "/packages/core/src/templates.js";

            // ── Toast ──
            function toast(msg, kind = "info") {
                const t = document.createElement("div");
                t.className = "toast" + (kind === "error" ? " error" : "");
                t.textContent = msg;
                document.getElementById("toast-host").appendChild(t);
                setTimeout(() => t.classList.add("fade"), 4500);
                setTimeout(() => t.remove(), 5000);
            }

            // ── Fort picker ──
            // Manages the active fort via fortStore. Switching forts reloads the page
            // because the static authored DOM + restoreEntities pipeline is keyed off
            // the active fort at load time; rebuilding in-place would be more code than
            // a reload is worth at this stage.
            const fortPickerBtn = document.getElementById("fort-picker-btn");
            const fortPickerLabel =
                document.getElementById("fort-picker-label");
            const fortPickerMenu = document.getElementById("fort-picker-menu");

            // Modal helpers — replacements for native prompt() / confirm() that some
            // browsers block on dynamic pages. Both return a Promise.
            function promptModal({
                title,
                label,
                value = "",
                okLabel = "OK",
                cancelLabel = "Cancel",
            }) {
                return new Promise((resolve) => {
                    const modal = document.createElement("rune-modal");
                    modal.setAttribute("title", title);
                    modal.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:12px;min-width:320px;">
          <label style="font-size:11px;color:#a8a59a;">${label}</label>
          <input type="text" data-prompt-input
            style="background:#0a0c0a;border:1px solid #2a322a;color:#e8e4d8;padding:8px 10px;font:inherit;font-size:12px;outline:none;"
            value="" />
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button type="button" data-action="cancel"
              style="background:transparent;border:1px solid #2a322a;color:#a8a59a;padding:6px 14px;font:inherit;font-size:11px;cursor:pointer;">${cancelLabel}</button>
            <button type="button" data-action="ok" class="primary"
              style="background:#7fb850;border:1px solid #7fb850;color:#0a0c0a;padding:6px 14px;font:inherit;font-size:11px;cursor:pointer;">${okLabel}</button>
          </div>
        </div>
      `;
                    document.body.appendChild(modal);
                    const input = modal.querySelector("[data-prompt-input]");
                    input.value = value;
                    let result = null;
                    modal
                        .querySelector('[data-action="cancel"]')
                        .addEventListener("click", () => modal.close());
                    modal
                        .querySelector('[data-action="ok"]')
                        .addEventListener("click", () => {
                            result = input.value;
                            modal.close();
                        });
                    input.addEventListener("keydown", (e) => {
                        if (e.key === "Enter") {
                            result = input.value;
                            modal.close();
                        }
                    });
                    modal.addEventListener("rune:modal-close", () => {
                        setTimeout(() => modal.remove(), 50);
                        resolve(result);
                    });
                    modal.open();
                    setTimeout(() => {
                        input.focus();
                        input.select();
                    }, 50);
                });
            }

            function confirmModal({
                title,
                message,
                okLabel = "OK",
                cancelLabel = "Cancel",
                danger = false,
            }) {
                return new Promise((resolve) => {
                    const modal = document.createElement("rune-modal");
                    modal.setAttribute("title", title);
                    const okColor = danger ? "#ff8a3d" : "#7fb850";
                    modal.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:16px;min-width:320px;max-width:480px;">
          <p style="margin:0;color:#e8e4d8;font-size:12px;line-height:1.5;">${message}</p>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button type="button" data-action="cancel"
              style="background:transparent;border:1px solid #2a322a;color:#a8a59a;padding:6px 14px;font:inherit;font-size:11px;cursor:pointer;">${cancelLabel}</button>
            <button type="button" data-action="ok"
              style="background:${okColor};border:1px solid ${okColor};color:#0a0c0a;padding:6px 14px;font:inherit;font-size:11px;cursor:pointer;">${okLabel}</button>
          </div>
        </div>
      `;
                    document.body.appendChild(modal);
                    let result = false;
                    modal
                        .querySelector('[data-action="cancel"]')
                        .addEventListener("click", () => modal.close());
                    modal
                        .querySelector('[data-action="ok"]')
                        .addEventListener("click", () => {
                            result = true;
                            modal.close();
                        });
                    modal.addEventListener("rune:modal-close", () => {
                        setTimeout(() => modal.remove(), 50);
                        resolve(result);
                    });
                    modal.open();
                });
            }

            // Demo state — true when no forts exist and we're showing forts/welcome.json
            // read-only. Set by the boot logic at the bottom of this script.
            let isDemoMode = false;

            function activeFort() {
                const id = fortStore.getActiveId();
                return id ? fortStore.get(id) : null;
            }

            function refreshFortLabel() {
                if (isDemoMode) {
                    fortPickerLabel.textContent = "Demo fort (read-only)";
                    return;
                }
                const meta = activeFort();
                fortPickerLabel.textContent = meta ? meta.title : "(no fort)";
            }

            function closeFortMenu() {
                fortPickerMenu.hidden = true;
                fortPickerBtn.setAttribute("aria-expanded", "false");
            }

            function renderFortMenu() {
                const forts = fortStore.list();
                const activeId = fortStore.getActiveId();
                fortPickerMenu.replaceChildren();

                for (const f of forts) {
                    const item = document.createElement("div");
                    item.className =
                        "fort-picker-item" +
                        (f.id === activeId ? " active" : "");
                    item.setAttribute("role", "option");
                    item.tabIndex = 0;

                    const title = document.createElement("span");
                    title.textContent = f.title;
                    const meta = document.createElement("span");
                    meta.className = "fort-meta";
                    meta.textContent = new Date(
                        f.updatedAt,
                    ).toLocaleDateString();
                    item.append(title, meta);

                    item.addEventListener("click", () => {
                        if (f.id === activeId) {
                            closeFortMenu();
                            return;
                        }
                        fortStore.setActiveId(f.id);
                        location.reload();
                    });
                    fortPickerMenu.appendChild(item);
                }

                if (forts.length === 0) {
                    const empty = document.createElement("div");
                    empty.className = "fort-picker-item";
                    empty.style.color = "#6e6c63";
                    empty.textContent = "(no forts yet)";
                    fortPickerMenu.appendChild(empty);
                }

                const sep = document.createElement("div");
                sep.className = "fort-picker-sep";
                fortPickerMenu.appendChild(sep);

                const actions = document.createElement("div");
                actions.className = "fort-picker-actions";

                const btnNew = document.createElement("button");
                btnNew.type = "button";
                btnNew.textContent = "+ new fort";
                btnNew.addEventListener("click", async () => {
                    closeFortMenu();
                    const title = await promptModal({
                        title: "New fort",
                        label: "Fort name",
                        value: "Untitled fort",
                        okLabel: "Create",
                    });
                    if (title === null) return;
                    const meta = fortStore.create({
                        title: title.trim() || "Untitled fort",
                    });
                    fortStore.setActiveId(meta.id);
                    location.reload();
                });

                const btnRename = document.createElement("button");
                btnRename.type = "button";
                btnRename.textContent = "rename";
                btnRename.disabled = !activeId || isDemoMode;
                btnRename.addEventListener("click", async () => {
                    const cur = activeFort();
                    if (!cur) return;
                    closeFortMenu();
                    const title = await promptModal({
                        title: "Rename fort",
                        label: "Fort name",
                        value: cur.title,
                        okLabel: "Rename",
                    });
                    if (title === null) return;
                    fortStore.update(cur.id, {
                        title: title.trim() || cur.title,
                    });
                    refreshFortLabel();
                    toast("renamed");
                });

                const btnDelete = document.createElement("button");
                btnDelete.type = "button";
                btnDelete.className = "danger";
                btnDelete.textContent = "delete";
                btnDelete.disabled = !activeId || isDemoMode;
                btnDelete.addEventListener("click", async () => {
                    const cur = activeFort();
                    if (!cur) return;
                    closeFortMenu();
                    const ok = await confirmModal({
                        title: "Delete fort",
                        message: `Delete <strong>${cur.title.replace(/[<>&"]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" })[c])}</strong>? Local data will be removed permanently.`,
                        okLabel: "Delete",
                        danger: true,
                    });
                    if (!ok) return;
                    fortStore.delete(cur.id);
                    // ensureActive on next load creates a fresh fort if none remain.
                    location.reload();
                });

                actions.append(btnNew, btnRename, btnDelete);
                fortPickerMenu.appendChild(actions);
            }

            fortPickerBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                const isOpen = !fortPickerMenu.hidden;
                if (isOpen) {
                    closeFortMenu();
                    return;
                }
                renderFortMenu();
                fortPickerMenu.hidden = false;
                fortPickerBtn.setAttribute("aria-expanded", "true");
            });
            document.addEventListener("click", (e) => {
                if (!fortPickerMenu.hidden && !e.target.closest("#fort-picker"))
                    closeFortMenu();
            });
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && !fortPickerMenu.hidden)
                    closeFortMenu();
            });

            // ── Cost meter ──
            const costMeter = document.getElementById("cost-meter");
            function updateCostMeter() {
                const spent = settings.costSpent;
                const budget = settings.budgetUsd;
                costMeter.textContent = `cost: $${spent.toFixed(4)} / $${budget.toFixed(2)}`;
                costMeter.classList.toggle(
                    "over-budget",
                    budget > 0 && spent >= budget * 0.9,
                );
            }
            updateCostMeter();
            setInterval(updateCostMeter, 2000);

            // ── Selected scope: what does each action target? ──
            // We track the "most specific selected element" — clicking a room selects it,
            // clicking blank floor area (or focus events from elevator) selects the floor,
            // etc. Actions infer scope from the selected element + their own intent.
            let selected = {
                room: null,
                floor: null,
                building: null,
                campus: null,
            };
            const selectedInfo = document.getElementById("selected-info");
            const refineAction = document.getElementById("refine");
            const openDetailAction = document.getElementById("open-detail");

            function setSelected(el) {
                selected = {
                    room: null,
                    floor: null,
                    building: null,
                    campus: null,
                };
                if (!el) {
                    selectedInfo.innerHTML =
                        "click a tile to select · double-click (or Enter) to open detail · scope ↑";
                    refineAction.setAttribute("disabled", "");
                    openDetailAction.setAttribute("disabled", "");
                    return;
                }
                selected.room = el.closest("rune-room");
                selected.floor = el.closest("rune-floor");
                selected.building = el.closest("rune-building");
                selected.campus = el.closest("rune-campus");

                const parts = [];
                if (selected.campus)
                    parts.push(`<code>${selected.campus.id}</code>`);
                if (selected.building)
                    parts.push(`<code>${selected.building.id}</code>`);
                if (selected.floor)
                    parts.push(`<code>${selected.floor.id}</code>`);
                if (selected.room)
                    parts.push(`<code>${selected.room.id}</code>`);
                selectedInfo.innerHTML = `selected: ${parts.join(" › ")}`;

                if (selected.room) refineAction.removeAttribute("disabled");
                else refineAction.setAttribute("disabled", "");
                // open-detail is enabled whenever ANY element is selected
                openDetailAction.removeAttribute("disabled");
            }

            // Click any rune-* element to update selection
            document.body.addEventListener("click", (e) => {
                const t = e.target;
                if (!(t instanceof Element)) return;
                if (t.closest("rune-action, a, button, rune-modal")) return;
                const rune = t.closest(
                    "rune-room, rune-floor, rune-building, rune-campus",
                );
                if (rune) setSelected(rune);
            });

            // Double-click opens detail for the appropriate level. Routes by what
            // was clicked because most floor real estate is occupied by rooms / nav,
            // and there's rarely empty area to target.
            //
            //   dblclick elevator item → that floor's detail
            //   dblclick marquee link  → that building/campus detail
            //   dblclick a room        → its parent FLOOR detail (escalate one level)
            //   dblclick a floor body  → that floor's detail
            //   dblclick a building    → that building's detail
            //   dblclick a campus      → that campus detail
            document.body.addEventListener("dblclick", (e) => {
                const t = e.target;
                if (!(t instanceof Element)) return;
                // Don't intercept text selection in modals or action button activations
                if (t.closest("rune-modal, rune-action, button")) return;

                // 1. Elevator item → floor detail
                const elevatorItem = t.closest("rune-elevator [data-floor]");
                if (elevatorItem) {
                    const floorId = elevatorItem.dataset.floor;
                    const floor = floorId
                        ? document.getElementById(floorId)
                        : null;
                    if (floor) {
                        e.preventDefault();
                        openDetail(floor);
                        return;
                    }
                }

                // 2. Marquee link → its target's detail (parses #campus/building or #campus)
                const marqueeLink = t.closest("rune-marquee a[href^='#']");
                if (marqueeLink) {
                    const href = marqueeLink.getAttribute("href").slice(1);
                    const segments = href.split("/").filter(Boolean);
                    let target = null;
                    if (segments.length >= 2)
                        target = document.getElementById(segments[1]); // campus/building → building
                    else if (segments.length === 1)
                        target = document.getElementById(segments[0]); // campus
                    if (target) {
                        e.preventDefault();
                        openDetail(target);
                        return;
                    }
                }

                // 3. Generic anchor inside body — let it bubble (don't intercept arbitrary links)
                if (
                    t.closest("a[href]") &&
                    !t.closest("rune-elevator, rune-marquee")
                )
                    return;

                // 4. Walk up to find the most-relevant container.
                //    Single-click selects; dblclick opens detail at the matching level.
                const room = t.closest("rune-room");
                const floor = t.closest("rune-floor");
                const building = t.closest("rune-building");
                const campus = t.closest("rune-campus");
                const target = room || floor || building || campus;
                if (target) {
                    e.preventDefault();
                    openDetail(target);
                }
            });
            // Keyboard accessibility — Enter or Space on a focused room opens its
            // detail. (Replaces the prior rune:open handler so single-click no longer
            // opens the modal.)
            document.body.addEventListener("keydown", (e) => {
                if (e.key !== "Enter" && e.key !== " ") return;
                const room =
                    e.target instanceof Element
                        ? e.target.closest("rune-room")
                        : null;
                if (!room) return;
                if (e.target.closest("rune-modal, input, textarea, button"))
                    return;
                e.preventDefault();
                setSelected(room);
                openDetail(room);
            });
            // Suppress the default rune:open navigation (vscode://, etc.) since we now
            // surface room detail inline via dblclick / Enter.
            document.body.addEventListener("rune:open", (e) => {
                e.preventDefault();
            });

            // ── Generic detail modal: code on left, thread on right ──
            // Works for room / floor / building / campus. Snapshots the element's JSON,
            // wires the thread to the element's id, provides Refine / Copy / Delete.
            function openDetail(element) {
                const tag = element.tagName.toLowerCase();
                const level = tag.replace("rune-", ""); // room, floor, building, campus
                if (level === "room") return openRoomDetail(element);
                if (level === "floor") return openFloorDetail(element);
                if (level === "building") return openBuildingDetail(element);
                if (level === "campus") return openCampusDetail(element);
            }

            function snapshotRoom(room) {
                return {
                    id: room.id,
                    label: room.getAttribute("label") || "",
                    kind: room.getAttribute("data-kind") || "text",
                    position: (room.getAttribute("position") || "0,0")
                        .split(",")
                        .map((s) => parseInt(s.trim(), 10)),
                    size: (room.getAttribute("size") || "1,1")
                        .split(",")
                        .map((s) => parseInt(s.trim(), 10)),
                    state_class: room.getAttribute("state-class") || null,
                    body:
                        room.querySelector(".room-body, .rune-yt-body")
                            ?.textContent || "",
                    generated: room.dataset.runefortGenerated === "true",
                    anchor: room.getAttribute("anchor") || null,
                };
            }

            function snapshotFloor(floor) {
                return {
                    id: floor.id,
                    label: floor.getAttribute("label") || "",
                    data_level: floor.getAttribute("data-level") || null,
                    columns: parseInt(
                        floor.getAttribute("columns") || "12",
                        10,
                    ),
                    gap: floor.getAttribute("gap") || null,
                    cell_height: floor.getAttribute("cell-height") || null,
                    rooms: Array.from(
                        floor.querySelectorAll(":scope > rune-room"),
                    ).map(snapshotRoom),
                    generated: floor.dataset.runefortGenerated === "true",
                };
            }

            function snapshotBuilding(building) {
                return {
                    id: building.id,
                    label: building.getAttribute("label") || "",
                    floors: Array.from(
                        building.querySelectorAll(":scope > rune-floor"),
                    ).map(snapshotFloor),
                    generated: building.dataset.runefortGenerated === "true",
                };
            }

            function snapshotCampus(campus) {
                return {
                    id: campus.id,
                    label: campus.getAttribute("label") || "",
                    buildings: Array.from(
                        campus.querySelectorAll(":scope > rune-building"),
                    ).map(snapshotBuilding),
                    generated: campus.dataset.runefortGenerated === "true",
                };
            }

            function buildBreadcrumb(element) {
                const parts = [
                    element.closest("rune-campus")?.id,
                    element.closest("rune-building")?.id,
                    element.closest("rune-floor")?.id,
                    element.closest("rune-room")?.id,
                ].filter(Boolean);
                return parts.join(" › ");
            }

            /**
             * Generic detail modal builder.
             * @param {Object} cfg
             * @param {string} cfg.title
             * @param {string} cfg.level   "room" | "floor" | "building" | "campus"
             * @param {any} cfg.snapshot   JSON snapshot to render in the code pane
             * @param {string} cfg.threadRoomId  id used to fetch thread messages
             * @param {Object} cfg.actions {refineLabel, deleteFn, refineFn?}
             *   refineFn — async function(prompt) → updates element, returns {costUsd}
             *   deleteFn — () → removes the element from DOM
             */
            function buildDetailModal(cfg) {
                const modal = document.createElement("rune-modal");
                modal.setAttribute("title", cfg.title);
                modal.setAttribute("data-variant", "wide");
                const stateClass = cfg.snapshot.state_class || "";
                const stateBadge = stateClass
                    ? `<span class="pill ${stateClass}">${stateClass}</span>`
                    : "";
                const generatedBadge = cfg.snapshot.generated
                    ? `<span class="pill" style="margin-left:auto;">LLM-generated</span>`
                    : `<span class="pill" style="margin-left:auto;">authored</span>`;
                const levelLabel = cfg.level.toUpperCase();

                modal.innerHTML = `
      <div class="modal-detail-left">
        <header class="modal-detail-section-head">
          <span>content · ${cfg.level} JSON</span>
          ${stateBadge}
          ${generatedBadge}
        </header>
        <pre class="modal-detail-code" id="detail-code"></pre>
        <div class="modal-detail-actions">
          ${cfg.actions.refineFn ? `<button type="button" data-action="refine" class="primary">↻ refine via LLM</button>` : ""}
          <button type="button" data-action="copy">copy JSON</button>
          ${cfg.actions.deleteFn ? `<button type="button" data-action="delete" style="margin-left:auto;color:var(--rune-color-fault);border-color:var(--rune-color-fault);">delete ${cfg.level}</button>` : ""}
        </div>
      </div>
      <div class="modal-detail-right">
        <header class="modal-detail-section-head">
          <span>thread · ${cfg.level} history</span>
          <span class="pill" style="margin-left:auto;">${escapeAttr(cfg.threadRoomId)}</span>
        </header>
        <rune-thread room-id="${escapeAttr(cfg.threadRoomId)}" show-input></rune-thread>
      </div>
    `;
                document.body.appendChild(modal);
                modal.addEventListener("rune:modal-close", () =>
                    setTimeout(() => modal.remove(), 50),
                );

                const codeEl = modal.querySelector("#detail-code");
                codeEl.textContent = JSON.stringify(cfg.snapshot, null, 2);

                // Copy
                modal
                    .querySelector('[data-action="copy"]')
                    .addEventListener("click", async () => {
                        try {
                            await navigator.clipboard.writeText(
                                JSON.stringify(cfg.snapshot, null, 2),
                            );
                            toast("copied JSON to clipboard");
                        } catch (_) {
                            toast("clipboard write blocked", "error");
                        }
                    });
                // Delete
                if (cfg.actions.deleteFn) {
                    modal
                        .querySelector('[data-action="delete"]')
                        .addEventListener("click", () => {
                            if (
                                !confirm(
                                    `delete ${cfg.level} "${cfg.snapshot.id}"? thread history is kept.`,
                                )
                            )
                                return;
                            cfg.actions.deleteFn();
                            modal.close();
                            toast(`removed ${cfg.level} "${cfg.snapshot.id}"`);
                        });
                }
                // Refine via separate prompt modal
                if (cfg.actions.refineFn) {
                    modal
                        .querySelector('[data-action="refine"]')
                        .addEventListener("click", () => {
                            modal.close();
                            buildPromptModal({
                                title: `refine ${cfg.level} · ${cfg.snapshot.id}`,
                                placeholder: `e.g. 'add a state class of fault' or 'rename to something more concise'`,
                                submitLabel: "refine",
                                onSubmit: async (prompt) => {
                                    const r =
                                        await cfg.actions.refineFn(prompt);
                                    updateCostMeter();
                                    toast(
                                        `refined ${cfg.level} "${cfg.snapshot.id}" · $${(r?.costUsd || 0).toFixed(4)}`,
                                    );
                                },
                            }).open();
                        });
                }

                // Reply via thread textarea — same as refine but inline
                const threadEl = modal.querySelector("rune-thread");
                threadEl.addEventListener("rune:thread-reply", async (ev) => {
                    if (!cfg.actions.refineFn) {
                        toast(
                            "refine not available for this level yet",
                            "error",
                        );
                        return;
                    }
                    try {
                        const r = await cfg.actions.refineFn(ev.detail.content);
                        updateCostMeter();
                        toast(
                            `refined "${cfg.snapshot.id}" · $${(r?.costUsd || 0).toFixed(4)}`,
                        );
                        // Re-render code pane with fresh snapshot
                        cfg.snapshot = cfg.refreshSnapshot
                            ? cfg.refreshSnapshot()
                            : cfg.snapshot;
                        codeEl.textContent = JSON.stringify(
                            cfg.snapshot,
                            null,
                            2,
                        );
                        threadEl.reload();
                    } catch (err) {
                        toast(err.message, "error");
                    }
                });

                modal.open();
                return modal;
            }

            function openRoomDetail(room) {
                return buildDetailModal({
                    title: buildBreadcrumb(room),
                    level: "room",
                    snapshot: snapshotRoom(room),
                    threadRoomId: room.id,
                    refreshSnapshot: () => snapshotRoom(room),
                    actions: {
                        refineFn: async (prompt) => refineRoom(room, prompt),
                        deleteFn: () => {
                            entityStore.remove(room.id);
                            room.remove();
                            setSelected(null);
                        },
                    },
                });
            }

            function openFloorDetail(floor) {
                let cur = floor;
                return buildDetailModal({
                    title: buildBreadcrumb(floor),
                    level: "floor",
                    snapshot: snapshotFloor(floor),
                    threadRoomId: floor.id,
                    refreshSnapshot: () => snapshotFloor(cur),
                    actions: {
                        refineFn: async (prompt) => {
                            const r = await refineEntity(cur, prompt);
                            cur = r.element; // the element is replaced; track the new one
                            return r;
                        },
                        deleteFn: () => {
                            entityStore.remove(cur.id);
                            cur.remove();
                            setSelected(null);
                        },
                    },
                });
            }

            function openBuildingDetail(building) {
                let cur = building;
                return buildDetailModal({
                    title: buildBreadcrumb(building),
                    level: "building",
                    snapshot: snapshotBuilding(building),
                    threadRoomId: building.id,
                    refreshSnapshot: () => snapshotBuilding(cur),
                    actions: {
                        refineFn: async (prompt) => {
                            const r = await refineEntity(cur, prompt);
                            cur = r.element;
                            return r;
                        },
                        deleteFn: () => {
                            entityStore.remove(cur.id);
                            cur.remove();
                            setSelected(null);
                            refreshMarquees();
                        },
                    },
                });
            }

            function openCampusDetail(campus) {
                let cur = campus;
                return buildDetailModal({
                    title: buildBreadcrumb(campus),
                    level: "campus",
                    snapshot: snapshotCampus(campus),
                    threadRoomId: campus.id,
                    refreshSnapshot: () => snapshotCampus(cur),
                    actions: {
                        refineFn: async (prompt) => {
                            const r = await refineEntity(cur, prompt);
                            cur = r.element;
                            return r;
                        },
                        deleteFn: () => {
                            entityStore.remove(cur.id);
                            cur.remove();
                            setSelected(null);
                            refreshMarquees();
                        },
                    },
                });
            }

            // ── Modal builders ──
            function buildSettingsModal() {
                const modal = document.createElement("rune-modal");
                modal.setAttribute("title", "Settings · OpenRouter");
                const opts = RECOMMENDED_MODELS.map(
                    (m) =>
                        `<option value="${m.id}" ${m.id === settings.model ? "selected" : ""}>${m.label} ($${m.input}/$${m.output} per 1M)</option>`,
                ).join("");
                modal.innerHTML = `
      <form id="settings-form">
        <label for="api-key">API key</label>
        <input id="api-key" name="apiKey" type="password" placeholder="sk-or-v1-..." value="${escapeAttr(settings.apiKey)}" />
        <small>localStorage. Visible to any script on this page. Don't share devices.</small>

        <label for="model-select">Model</label>
        <select id="model-select" name="model">${opts}</select>

        <label for="budget-input">Budget cap (USD; 0 = no cap)</label>
        <input id="budget-input" name="budget" type="number" step="0.01" min="0" value="${settings.budgetUsd}" />
        <small>spent: <span style="color:#ff8a3d;">$${settings.costSpent.toFixed(4)}</span>
          <button type="button" id="reset-cost" style="margin-left:8px;padding:2px 8px;">reset spent</button>
        </small>

        <div class="modal-actions">
          <button type="button" data-runefort-close>cancel</button>
          <button type="submit" class="primary">save</button>
        </div>
      </form>
    `;
                document.body.appendChild(modal);
                modal
                    .querySelector("#settings-form")
                    .addEventListener("submit", (ev) => {
                        ev.preventDefault();
                        const fd = new FormData(ev.target);
                        settings.apiKey =
                            fd.get("apiKey")?.toString().trim() || "";
                        settings.model =
                            fd.get("model")?.toString() || settings.model;
                        const b = parseFloat(
                            fd.get("budget")?.toString() || "5",
                        );
                        if (!isNaN(b)) settings.budgetUsd = b;
                        updateCostMeter();
                        toast(`saved · ${settings.model.split("/").pop()}`);
                        modal.close();
                        modal.remove();
                    });
                modal
                    .querySelector("#reset-cost")
                    .addEventListener("click", () => {
                        settings.resetCost();
                        updateCostMeter();
                        toast("cost reset");
                        modal.close();
                        modal.remove();
                    });
                return modal;
            }

            /**
             * Create a prompt modal. Optional `picker` shows a card grid of options
             * (kinds for rooms, templates for floor/building/campus). The picker's
             * value is passed as `pickedId` to onSubmit. The picker can also pre-fill
             * the prompt textarea via `starterPromptFor(pickedId)`.
             */
            function buildPromptModal({
                title,
                placeholder,
                submitLabel,
                onSubmit,
                picker,
                starterPromptFor,
            }) {
                const modal = document.createElement("rune-modal");
                modal.setAttribute("title", title);

                let pickerHtml = "";
                if (picker && picker.options && picker.options.length) {
                    pickerHtml = `
        <label>${escapeAttr(picker.label || "Type")}</label>
        <div class="kind-picker">
          ${picker.options
              .map(
                  (opt, i) => `
            <label>
              <input type="radio" name="picker" value="${escapeAttr(opt.id)}" ${i === 0 ? "checked" : ""} />
              <span class="kind-picker-head">
                <span class="kind-picker-icon">${escapeAttr(opt.icon || "·")}</span>
                <span>${escapeAttr(opt.label)}</span>
              </span>
              <span class="kind-picker-desc">${escapeAttr(opt.description || "")}</span>
            </label>
          `,
              )
              .join("")}
        </div>
      `;
                }

                modal.innerHTML = `
      <form id="prompt-form">
        ${pickerHtml}
        <div id="kind-extra" style="display:none;">
          <label for="yt-url">YouTube URL or video ID</label>
          <input id="yt-url" name="ytUrl" type="text" placeholder="https://www.youtube.com/watch?v=..." />
          <small>Paste a real URL — the LLM only generates the title and body, the video ID comes from here.</small>
        </div>
        <label for="prompt-input">Prompt</label>
        <textarea id="prompt-input" name="prompt" rows="5" placeholder="${escapeAttr(placeholder)}" autofocus></textarea>
        <small>Cmd-Enter / Ctrl-Enter to submit.</small>
        <div class="modal-actions">
          <button type="button" data-runefort-close>cancel</button>
          <button type="submit" class="primary">${submitLabel}</button>
        </div>
      </form>
    `;
                document.body.appendChild(modal);
                const ta = modal.querySelector("#prompt-input");
                const ytExtra = modal.querySelector("#kind-extra");

                // Toggle the YouTube extra-input when "youtube" is picked
                function toggleKindExtras(value) {
                    if (!ytExtra) return;
                    ytExtra.style.display =
                        value === "youtube" ? "block" : "none";
                }

                // If we have a picker with starterPrompt, swap textarea content as user picks options
                if (picker) {
                    modal
                        .querySelectorAll('input[name="picker"]')
                        .forEach((inp) => {
                            inp.addEventListener("change", () => {
                                if (!inp.checked) return;
                                toggleKindExtras(inp.value);
                                if (starterPromptFor) {
                                    const starter = starterPromptFor(inp.value);
                                    if (starter) ta.value = starter;
                                }
                            });
                        });
                    const initial = picker.options[0];
                    toggleKindExtras(initial.id);
                    if (starterPromptFor) {
                        const starter = starterPromptFor(initial.id);
                        if (starter) ta.value = starter;
                    }
                }

                ta.addEventListener("keydown", (e) => {
                    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
                        e.preventDefault();
                        modal.querySelector("form").requestSubmit();
                    }
                });
                modal
                    .querySelector("#prompt-form")
                    .addEventListener("submit", async (ev) => {
                        ev.preventDefault();
                        const prompt = ta.value.trim();
                        if (!prompt) return;
                        const pickedId = getPickerValue(modal);
                        // Pull extras (YouTube URL → video ID) when relevant
                        const extras = {};
                        if (pickedId === "youtube") {
                            const ytUrl = modal
                                .querySelector("#yt-url")
                                ?.value?.trim();
                            const videoId = parseYouTubeId(ytUrl);
                            if (!videoId) {
                                toast(
                                    "paste a valid YouTube URL or 11-char video ID",
                                    "error",
                                );
                                return;
                            }
                            extras.videoId = videoId;
                        }
                        const submitBtn = ev.target.querySelector(
                            'button[type="submit"]',
                        );
                        submitBtn.disabled = true;
                        submitBtn.textContent = "thinking…";
                        try {
                            await onSubmit(prompt, pickedId, extras);
                            modal.close();
                            modal.remove();
                        } catch (err) {
                            toast(err.message, "error");
                            submitBtn.disabled = false;
                            submitBtn.textContent = submitLabel;
                        }
                    });
                return modal;
            }

            /** Parse a YouTube video ID from various URL shapes or accept raw ID. */
            function parseYouTubeId(input) {
                if (!input) return null;
                const s = input.trim();
                // Raw 11-char id
                if (/^[A-Za-z0-9_-]{11}$/.test(s)) return s;
                try {
                    const u = new URL(
                        s.startsWith("http") ? s : `https://${s}`,
                    );
                    // youtube.com/watch?v=ID
                    const v = u.searchParams.get("v");
                    if (v && /^[A-Za-z0-9_-]{11}$/.test(v)) return v;
                    // youtu.be/ID, youtube.com/embed/ID, youtube.com/shorts/ID
                    const m = u.pathname.match(
                        /(?:embed|shorts|live)\/([A-Za-z0-9_-]{11})/,
                    );
                    if (m) return m[1];
                    const last = u.pathname.split("/").filter(Boolean).pop();
                    if (last && /^[A-Za-z0-9_-]{11}$/.test(last)) return last;
                } catch (_) {}
                return null;
            }
            function getPickerValue(modal, fallbackToFirst = false) {
                const checked = modal.querySelector(
                    'input[name="picker"]:checked',
                );
                if (checked) return checked.value;
                if (fallbackToFirst) {
                    const first = modal.querySelector('input[name="picker"]');
                    if (first) return first.value;
                }
                return null;
            }

            // ── After any generation, rebuild the building floor index + refresh
            //    marquees and elevators so new options appear immediately. ──
            function refreshMarquees() {
                document.querySelectorAll("rune-building").forEach((b) => {
                    // Building's internal _floorIndex is built once at connect; rebuild
                    // when floors are added/removed dynamically.
                    if (typeof b._rebuildIndex === "function")
                        b._rebuildIndex();
                    // Re-apply data-active to the currently-active floor (since rebuild clears it)
                    if (typeof b._applyActiveFloor === "function")
                        b._applyActiveFloor();
                });
                document.querySelectorAll("rune-marquee").forEach((m) => {
                    if (typeof m.refresh === "function") m.refresh();
                });
                document.querySelectorAll("rune-elevator").forEach((el) => {
                    if (typeof el.refresh === "function") {
                        el.refresh();
                    } else if (typeof el._buildAutoList === "function") {
                        // Fallback: graft refresh onto stale-cached classes by calling private method
                        el._buildAutoList();
                    }
                });
            }

            // ── Action handlers ──
            document.body.addEventListener("rune:action", async (ev) => {
                const id = ev.detail.id;

                if (id === "settings") {
                    buildSettingsModal().open();
                    return;
                }

                if (id === "clear-threads") {
                    const choice = prompt(
                        "clear what?\n  1 = thread history only (keep generated layout)\n  2 = thread history + all generated layout\n  3 = also revoke API key + reset cost",
                        "1",
                    );
                    if (!choice) return;
                    if (choice === "1" || choice === "2" || choice === "3") {
                        threadStore.clearAll();
                    }
                    if (choice === "2" || choice === "3") {
                        entityStore.clearAll();
                        // Also remove generated DOM elements
                        document
                            .querySelectorAll(
                                '[data-runefort-generated="true"]',
                            )
                            .forEach((el) => el.remove());
                        refreshMarquees();
                    }
                    if (choice === "3") {
                        settings.apiKey = "";
                        settings.resetCost();
                        updateCostMeter();
                    }
                    toast(
                        choice === "1"
                            ? "threads cleared"
                            : choice === "2"
                              ? "threads + layout cleared"
                              : "everything cleared",
                    );
                    return;
                }

                // ─── + room ───
                if (id === "add-room") {
                    const target =
                        selected.floor ||
                        document.querySelector(
                            "rune-campus[data-active] rune-building[data-active] rune-floor[data-active]",
                        ) ||
                        document.querySelector("rune-floor[data-active]");
                    if (!target) {
                        toast("no active floor", "error");
                        return;
                    }
                    buildPromptModal({
                        title: `+ room · floor "${target.id}"`,
                        placeholder: "describe what this tile should show…",
                        submitLabel: "generate",
                        picker: { label: "Room kind", options: roomKinds },
                        onSubmit: async (prompt, pickedKind, extras = {}) => {
                            const r = await generateRoomFor(target, prompt, {
                                kind: pickedKind || "text",
                                videoId: extras.videoId || null,
                            });
                            updateCostMeter();
                            refreshMarquees();
                            toast(
                                `+ ${pickedKind || "text"} room "${r.json.id}" · $${r.costUsd.toFixed(4)}`,
                            );
                            const newRoom = target.querySelector(
                                `#${CSS.escape(r.json.id)}`,
                            );
                            if (newRoom) setSelected(newRoom);
                        },
                    }).open();
                    return;
                }

                // ─── + floor ───
                if (id === "add-floor") {
                    const target =
                        selected.building ||
                        document.querySelector(
                            "rune-campus[data-active] rune-building[data-active]",
                        ) ||
                        document.querySelector("rune-building[data-active]");
                    if (!target) {
                        toast("no active building", "error");
                        return;
                    }
                    buildPromptModal({
                        title: `+ floor · building "${target.id}"`,
                        placeholder: "describe the floor and its tiles…",
                        submitLabel: "generate",
                        picker: {
                            label: "Floor template",
                            options: floorTemplates,
                        },
                        starterPromptFor: (id) =>
                            floorTemplates.find((t) => t.id === id)
                                ?.starterPrompt || "",
                        onSubmit: async (prompt, pickedTemplate) => {
                            // Fresh dynamic imports of BOTH runtime and templates to bypass the
                            // browser ESM cache during development. Once we ship a real bundle
                            // with content hashes in URLs, the static imports above are fine.
                            const cb = Date.now();
                            const tplMod = await import(
                                `/packages/core/src/templates.js?cb=${cb}`
                            );
                            const rtMod = await import(
                                `/packages/core/src/runtime.js?cb=${cb}`
                            );
                            const tpl = tplMod.floorTemplates.find(
                                (t) => t.id === pickedTemplate,
                            );
                            const r = await rtMod.generateFloorFor(
                                target,
                                prompt,
                                {
                                    template: pickedTemplate,
                                    postProcess: tpl?.postProcess,
                                },
                            );
                            updateCostMeter();
                            refreshMarquees();
                            toast(
                                `+ floor "${r.json.id}" · ${r.json.rooms?.length || 0} rooms · $${r.costUsd.toFixed(4)}`,
                            );
                            if (typeof target.activate === "function")
                                target.activate(r.json.id);
                        },
                    }).open();
                    return;
                }

                // ─── + building ───
                if (id === "add-building") {
                    const target =
                        selected.campus ||
                        document.querySelector("rune-campus[data-active]");
                    if (!target) {
                        toast("no active campus", "error");
                        return;
                    }
                    buildPromptModal({
                        title: `+ building · campus "${target.id}"`,
                        placeholder: "describe the building and its floors…",
                        submitLabel: "generate",
                        picker: {
                            label: "Building template",
                            options: buildingTemplates,
                        },
                        starterPromptFor: (id) =>
                            buildingTemplates.find((t) => t.id === id)
                                ?.starterPrompt || "",
                        onSubmit: async (prompt, pickedTemplate) => {
                            const r = await generateBuildingFor(
                                target,
                                prompt,
                                { template: pickedTemplate },
                            );
                            updateCostMeter();
                            refreshMarquees();
                            toast(
                                `+ building "${r.json.id}" · ${r.json.floors?.length || 0} floors · $${r.costUsd.toFixed(4)}`,
                            );
                            if (typeof target.activate === "function")
                                target.activate(r.json.id);
                            window.location.hash = `${target.id}/${r.json.id}`;
                        },
                    }).open();
                    return;
                }

                // ─── + campus ───
                if (id === "add-campus") {
                    buildPromptModal({
                        title: `+ campus`,
                        placeholder: "describe the campus and its buildings…",
                        submitLabel: "generate",
                        picker: {
                            label: "Campus template",
                            options: campusTemplates,
                        },
                        starterPromptFor: (id) =>
                            campusTemplates.find((t) => t.id === id)
                                ?.starterPrompt || "",
                        onSubmit: async (prompt, pickedTemplate) => {
                            const r = await generateCampusFor(
                                document.body,
                                prompt,
                                { template: pickedTemplate },
                            );
                            updateCostMeter();
                            refreshMarquees();
                            const buildings = r.json.buildings?.length || 0;
                            const floors = (r.json.buildings || []).reduce(
                                (sum, b) => sum + (b.floors?.length || 0),
                                0,
                            );
                            toast(
                                `+ campus "${r.json.id}" · ${buildings} buildings · ${floors} floors · $${r.costUsd.toFixed(4)}`,
                            );
                            window.location.hash = r.json.id;
                        },
                    }).open();
                    return;
                }

                // ─── open-detail ───
                if (id === "open-detail") {
                    // Open detail for the most-specific selected element (room > floor > building > campus)
                    const target =
                        selected.room ||
                        selected.floor ||
                        selected.building ||
                        selected.campus;
                    if (!target) {
                        toast("nothing selected", "error");
                        return;
                    }
                    openDetail(target);
                    return;
                }

                // ─── refine ───
                if (id === "refine") {
                    if (!selected.room) {
                        toast("select a room to refine", "error");
                        return;
                    }
                    const room = selected.room;
                    buildPromptModal({
                        title: `refine · ${room.id}`,
                        placeholder:
                            "e.g. 'make it bigger' or 'change state to fault'",
                        submitLabel: "refine",
                        onSubmit: async (prompt) => {
                            const r = await refineRoom(room, prompt);
