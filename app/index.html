                            updateCostMeter();
                            toast(
                                `refined "${room.id}" · $${r.costUsd.toFixed(4)}`,
                            );
                        },
                    }).open();
                    return;
                }
            });

            function escapeAttr(s) {
                return String(s || "")
                    .replace(/&/g, "&amp;")
                    .replace(/"/g, "&quot;")
                    .replace(/</g, "&lt;");
            }

            // ── Demo fort loading + fork CTA ──
            // First-time visitors (no forts in registry) see forts/welcome.json mounted
            // read-only. Click "Fork to start editing" to copy it into a new local fort.
            const demoBanner = document.getElementById("demo-banner");
            const demoForkBtn = document.getElementById("demo-fork-btn");

            /** @type {any|null} */
            let demoFortDoc = null; // cached after first fetch, for fork

            async function loadDemoFort() {
                isDemoMode = true;
                refreshFortLabel();
                document.body.classList.add("is-demo");
                demoBanner.hidden = false;

                let doc;
                try {
                    const res = await fetch("/forts/welcome.json", {
                        cache: "no-cache",
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    doc = await res.json();
                } catch (e) {
                    console.warn("loadDemoFort: failed to fetch", e);
                    toast("could not load demo fort", "error");
                    return;
                }
                demoFortDoc = doc;

                if (!doc.campus) {
                    console.warn(
                        "loadDemoFort: welcome.json missing 'campus' field",
                    );
                    return;
                }

                try {
                    const campusEl = campusFromJson(doc.campus);
                    // Demo content is unsaved — strip the "generated" marker so it doesn't
                    // get visually treated like LLM output, and tag it so we can identify it.
                    campusEl.removeAttribute("data-runefort-generated");
                    campusEl.setAttribute("data-runefort-demo", "true");
                    document.body.appendChild(campusEl);
                    refreshMarquees();
                } catch (e) {
                    console.warn("loadDemoFort: failed to mount campus", e);
                    toast("could not render demo fort", "error");
                }
            }

            /**
             * Fork the currently-shown demo fort into a new local fort. Persists each
             * top-level entity (campus → buildings → floors → rooms) into the new fort's
             * entityStore, sets it active, reloads.
             */
            async function forkDemoFort() {
                if (!demoFortDoc) {
                    toast("demo fort not loaded yet", "error");
                    return;
                }
                const title = await promptModal({
                    title: "Fork demo fort",
                    label: "Name your fork",
                    value: demoFortDoc.title || "My fort",
                    okLabel: "Fork",
                });
                if (title === null) return;

                const meta = fortStore.create({
                    title: title.trim() || "My fort",
                    vocabulary: demoFortDoc.vocabulary || "core",
                });
                fortStore.setActiveId(meta.id);

                // Persist the campus + descendants into the active fort's entityStore so
                // that on reload, restoreEntities() rebuilds the same tree. We snapshot in
                // top-down order: campus first, then its buildings, then their floors,
                // then their rooms — matching the order restoreEntities expects.
                const campus = demoFortDoc.campus;
                const campusJson = { ...campus };
                delete campusJson.buildings; // children persisted separately
                entityStore.put(campus.id, "campus", null, campusJson);

                for (const b of campus.buildings || []) {
                    const buildingJson = { ...b };
                    delete buildingJson.floors;
                    entityStore.put(b.id, "building", campus.id, buildingJson);

                    for (const f of b.floors || []) {
                        const floorJson = { ...f };
                        delete floorJson.rooms;
                        entityStore.put(f.id, "floor", b.id, floorJson);

                        for (const r of f.rooms || []) {
                            entityStore.put(r.id, "room", f.id, r);
                        }
                    }
                }

                location.reload();
            }
            demoForkBtn.addEventListener("click", forkDemoFort);

            // While in demo mode, intercept any action that would mutate the fort
            // (generate, refine, clear) and offer to fork instead. Capture phase so we
            // run before the action's own handler.
            const DEMO_BLOCKED_ACTION_IDS = new Set([
                "add-room",
                "add-floor",
                "add-building",
                "add-campus",
                "refine",
                "clear-threads",
            ]);
            document.addEventListener(
                "click",
                (e) => {
                    if (!isDemoMode) return;
                    const action =
                        e.target instanceof Element
                            ? e.target.closest("rune-action")
                            : null;
                    if (!action) return;
                    if (!DEMO_BLOCKED_ACTION_IDS.has(action.id)) return;
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    forkDemoFort();
                },
                true,
            );

            // ── Auth + cloud sync ──
            // Auth state is reflected on the toolbar's "sign in" / "<email>" button.
            // Sync only appears when (a) Supabase is configured AND (b) user is signed
            // in AND (c) the active fort is not the read-only demo.

            const authActionEl = document.getElementById("auth-action");
            const syncActionEl = document.getElementById("sync-fort");

            /** @type {any|null} */
            let currentUser = null;

            async function refreshAuthUi() {
                if (!isSupabaseConfigured()) {
                    authActionEl.setAttribute("hidden", "");
                    syncActionEl.setAttribute("hidden", "");
                    return;
                }
                authActionEl.removeAttribute("hidden");
                if (currentUser) {
                    const label = (currentUser.email || "signed in").slice(
                        0,
                        20,
                    );
                    authActionEl.setAttribute("label", label);
                    authActionEl.setAttribute("icon", "●");
                    // Show sync button only for editable forts.
                    if (!isDemoMode) syncActionEl.removeAttribute("hidden");
                    else syncActionEl.setAttribute("hidden", "");
                } else {
                    authActionEl.setAttribute("label", "sign in");
                    authActionEl.setAttribute("icon", "◐");
                    syncActionEl.setAttribute("hidden", "");

            }

            // Full auth modal — mirrors the bendscript / old_scrap/v2 pattern:

            // the user closes the dialog (return value is the last action taken).
            function authModal() {
                return new Promise((resolve) => {

                    modal.setAttribute("title", "Sign in");
                    modal.innerHTML = `

        </style>

        <!-- ─── Sign in (default) ─── -->

                    document.body.appendChild(modal);

                    let result = null;
                    const steps = ["signin", "signup", "reset", "notice"];
                    const stepEl = (name) =>

                    };

                    // ── Signin actions ──
                    modal
                        .querySelector('[data-action="signin"]')
                        .addEventListener("click", (e) => {
                            const btn = e.currentTarget;
                            const email = fieldEl("email").value.trim();
                            const password = fieldEl("password").value;
                            if (!email || !password) {
                                setError(
                                    "error",
                                    "Email and password required",
                                );
                                return;
                            }
                            setError("error", "");
                            withBusy(btn, async () => {
                                try {
                                    await signIn(email, password);
                                    result = "signed-in";
                                    modal.close();
                                } catch (err) {
                                    setError(
                                        "error",
                                        err?.message || "Sign in failed",
                                    );
                                }
                            });
                        });
                    modal
                        .querySelector('[data-action="magic"]')
                        .addEventListener("click", (e) => {
                            const btn = e.currentTarget;
                            const email = fieldEl("email").value.trim();
                            if (!email) {
                                setError("error", "Enter your email first");
                                return;
                            }
                            setError("error", "");
                            withBusy(btn, async () => {
                                try {
                                    await signInWithMagicLink(email);
                                    result = "magic-link-sent";
                                    showNotice(
                                        "✉",
                                        "Magic link sent",
                                        `We sent a sign-in link to ${email}. Click it to sign in — the page will pick up the session automatically when you return.`,
                                    );
                                } catch (err) {
                                    setError(
                                        "error",
                                        err?.message || "Send failed",
                                    );
                                }
                            });
                        });
                    modal
                        .querySelector('[data-action="oauth-google"]')
                        .addEventListener("click", async (e) => {
                            const btn = e.currentTarget;
                            await withBusy(btn, async () => {
                                try {
                                    await signInWithProvider("google");
                                } catch (err) {
                                    setError(
                                        "error",
                                        err?.message || "Google sign-in failed",
                                    );
                                }
                            });
                        });
                    modal
                        .querySelector('[data-action="oauth-github"]')
                        .addEventListener("click", async (e) => {
                            const btn = e.currentTarget;
                            await withBusy(btn, async () => {
                                try {
                                    await signInWithProvider("github");
                                } catch (err) {
                                    setError(
                                        "error",
                                        err?.message || "GitHub sign-in failed",
                                    );
                                }
                            });
                        });

                    // ── Signup actions ──
                    modal
                        .querySelector('[data-action="signup"]')
                        .addEventListener("click", (e) => {
                            const btn = e.currentTarget;
                            const email = fieldEl("email-signup").value.trim();
                            const password = fieldEl("password-signup").value;
                            if (!email || !password) {
                                setError(
                                    "error-signup",
                                    "Email and password required",
                                );
                                return;
                            }
                            if (password.length < 6) {
                                setError(
                                    "error-signup",
                                    "Password must be at least 6 characters",
                                );
                                return;
                            }
                            setError("error-signup", "");
                            withBusy(btn, async () => {
                                try {
                                    await signUp(email, password);
                                    result = "signed-up";
                                    showNotice(
                                        "✉",
                                        "Confirm your email",
                                        `We sent a confirmation link to ${email}. Click it to verify your account, then come back here to sign in.`,
                                    );
                                } catch (err) {
                                    setError(
                                        "error-signup",
                                        err?.message || "Sign up failed",
                                    );
                                }
                            });
                        });
                    modal
                        .querySelector('[data-action="magic-signup"]')
                        .addEventListener("click", (e) => {
                            const btn = e.currentTarget;
                            const email = fieldEl("email-signup").value.trim();
                            if (!email) {
                                setError(
                                    "error-signup",
                                    "Enter your email first",
                                );
                                return;
                            }
                            setError("error-signup", "");
                            withBusy(btn, async () => {
                                try {
                                    await signInWithMagicLink(email);
                                    result = "magic-link-sent";
                                    showNotice(
                                        "✉",
                                        "Magic link sent",
                                        `We sent a link to ${email}. Click it to create your account and sign in.`,
                                    );
                                } catch (err) {
                                    setError(
                                        "error-signup",
                                        err?.message || "Send failed",
                                    );
                                }
                            });
                        });

                    // ── Reset actions ──
                    modal
                        .querySelector('[data-action="reset"]')
                        .addEventListener("click", (e) => {
                            const btn = e.currentTarget;
                            const email = fieldEl("email-reset").value.trim();
                            if (!email) {
                                setError(
                                    "error-reset",
                                    "Enter your email first",
                                );
                                return;
                            }
                            setError("error-reset", "");
                            withBusy(btn, async () => {
                                try {
                                    await resetPasswordForEmail(email);
                                    result = "reset-sent";
                                    showNotice(
                                        "✉",
                                        "Reset link sent",
                                        `We sent a password-reset link to ${email}. Click it to set a new password.`,
                                    );
                                } catch (err) {
                                    setError(
                                        "error-reset",
                                        err?.message || "Send failed",
                                    );
                                }
                            });
                        });

                    // ── Mode toggles + close ──
                    modal
                        .querySelectorAll('[data-action="goto-signin"]')
                        .forEach((b) =>
                            b.addEventListener("click", () =>
                                showStep("signin"),
                            ),
                        );
                    modal
                        .querySelectorAll('[data-action="goto-signup"]')
                        .forEach((b) =>
                            b.addEventListener("click", () =>
                                showStep("signup"),
                            ),
                        );
                    modal
                        .querySelectorAll('[data-action="goto-reset"]')
                        .forEach((b) =>
                            b.addEventListener("click", () =>
                                showStep("reset"),
                            ),
                        );
                    modal
                        .querySelectorAll('[data-action="close"]')
                        .forEach((b) =>
                            b.addEventListener("click", () => modal.close()),
                        );

                    // Enter-to-submit on each step's primary action.
                    stepEl("signin").addEventListener("keydown", (e) => {
                        if (e.key === "Enter")
                            modal
                                .querySelector('[data-action="signin"]')
                                .click();
                    });
                    stepEl("signup").addEventListener("keydown", (e) => {
                        if (e.key === "Enter")
                            modal
                                .querySelector('[data-action="signup"]')
                                .click();
                    });
                    stepEl("reset").addEventListener("keydown", (e) => {
                        if (e.key === "Enter")
                            modal
                                .querySelector('[data-action="reset"]')
                                .click();
                    });

                    modal.addEventListener("rune:modal-close", () => {
                        setTimeout(() => modal.remove(), 50);
                        resolve(result);
                    });
                    modal.open();
                    setTimeout(() => fieldEl("email").focus(), 50);
                });
            }

            authActionEl.addEventListener("click", async () => {
                if (!isSupabaseConfigured()) {
                    toast(
                        "Supabase not configured (set window.RUNEFORT_SUPABASE)",
                        "error",
                    );
                    return;
                }
                if (currentUser) {
                    const ok = await confirmModal({
                        title: "Sign out",
                        message: `Sign out of <strong>${currentUser.email || "account"}</strong>? Your local forts stay on this device.`,
                        okLabel: "Sign out",
                    });
                    if (!ok) return;
                    await signOut();
                    currentUser = null;
                    await refreshAuthUi();
                    toast("signed out");
                } else {
                    const result = await authModal();
                    if (result === "signed-in") {
                        currentUser = await getCurrentUser();
                        await refreshAuthUi();
                        toast("signed in");
                    } else if (result === "magic-link-sent") {
                        toast("magic link sent — check your inbox");
                    } else if (result === "signed-up") {
                        toast("confirmation email sent");
                    } else if (result === "reset-sent") {
                        toast("reset link sent");
                    }
                    // Magic-link / signup paths complete async when the user clicks the
                    // link in their email; onAuthChange below picks up the session and
                    // refreshes the UI automatically.
                }
            });

            syncActionEl.addEventListener("click", async () => {
                if (isDemoMode) {
                    toast("fork the demo before syncing");
                    return;
                }
                const fortId = fortStore.getActiveId();
                if (!fortId) return;
                syncActionEl.setAttribute("disabled", "");
                syncActionEl.setAttribute("label", "syncing…");
                try {
                    const { cloudId, version } = await pushFort(fortId);
                    toast(`synced (v${version})`);
                } catch (e) {
                    if (e?.code === "STALE_WRITE") {
                        toast(
                            "cloud version is newer — pull or fork to merge",
                            "error",
                        );
                    } else {
                        toast(`sync failed: ${e?.message || e}`, "error");
                    }
                } finally {
                    syncActionEl.removeAttribute("disabled");
                    syncActionEl.setAttribute("label", "sync");
                }
            });

            // Initial auth state + subscription.
            if (isSupabaseConfigured()) {
                getCurrentUser().then((u) => {
                    currentUser = u;
                    refreshAuthUi();
                });
                onAuthChange((_event, session) => {
                    currentUser = session?.user || null;
                    refreshAuthUi();
                });
            } else {
                refreshAuthUi();
            }

            // ── Public fort URL handling ──
            // /?fort=<slug> loads a public fork by slug (anon read). Supersedes the
            // demo-fort path when set, even if the user has local forts.
            const urlParams = new URLSearchParams(window.location.search);
            const publicSlug = urlParams.get("fort");

            async function loadPublicSlug(slug) {
                if (!isSupabaseConfigured()) {
                    toast(
                        "Supabase not configured — public fort URLs require setup",
                        "error",
                    );
                    loadDemoFort();
                    return;
                }
                try {
                    const doc = await loadPublicFort(slug);
                    if (!doc) {
                        toast(`public fort not found: ${slug}`, "error");
                        loadDemoFort();
                        return;
                    }
                    // Mount it read-only with a fork CTA pointing at the cloud row.
                    isDemoMode = true;
                    refreshFortLabel();
                    document.body.classList.add("is-demo");
                    demoBanner.hidden = false;
                    demoFortDoc = doc; // reuse the demo plumbing — fork creates a local copy
                    // Override the fork button to use the server-side fork (preserves
                    // forked_from attribution + workspace placement).
                    demoForkBtn.textContent = "Fork to your account";
                    demoForkBtn.removeEventListener("click", forkDemoFort);
                    demoForkBtn.addEventListener("click", async () => {
                        const user = await getCurrentUser();
                        if (!user) {
                            toast("sign in to fork this fort", "error");
                            return;
                        }
                        try {
                            const { fortId } = await forkCloudFort(doc.id);
                            location.href = "/app/"; // drop the ?fort= param
                        } catch (e) {
                            toast(`fork failed: ${e?.message || e}`, "error");
                        }
                    });
                    const campusEl = campusFromJson(doc.document.campus);
                    campusEl.removeAttribute("data-runefort-generated");
                    campusEl.setAttribute("data-runefort-public", "true");
                    document.body.appendChild(campusEl);
                    refreshMarquees();
                } catch (e) {
                    console.warn("loadPublicSlug failed", e);
                    toast("could not load public fort", "error");
                    loadDemoFort();
                }
            }

            // ── Boot ──
            if (publicSlug) {
                loadPublicSlug(publicSlug);
            } else if (fortStore.list().length === 0) {
                loadDemoFort();
            } else {
                fortStore.ensureActive();
                refreshFortLabel();
                queueMicrotask(() => {
                    try {
                        const r = restoreEntities();
                        if (r.restored > 0) {
                            toast(
                                `restored ${r.restored} saved entit${r.restored === 1 ? "y" : "ies"}`,
                            );
                            refreshMarquees();
                        }
                    } catch (e) {
                        console.warn("restore failed", e);
                    }
                });
            }

            if (!settings.apiKey) {
                setTimeout(
                    () =>
                        toast("set OpenRouter API key in ⚙ Settings to start"),
                    600,
                );
            }
        </script>
    </body>
</html>
